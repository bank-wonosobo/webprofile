name: Next.js CI/CD for Staging

on:
  pull_request:
    branches: [staging]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ✅ Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🟩 Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"

      # 🐳 Docker: Login to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 Docker: Build image
      - name: Build Docker image
        run: |
          docker build --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} -t ghcr.io/${{ github.repository }}:staging .

      # 🚀 Docker: Push image
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:staging
