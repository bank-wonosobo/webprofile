services:
  webprofile:
    image: ${APP_IMAGE}:${APP_TAG}
    container_name: ${PROJECT_NAME}
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://api-dev.bankwonosobo.co.id
    volumes:
      - ./.env:/app/.env
    networks:
      - webprofile-network

networks:
  webprofile-network:
    name: webprofile-network
    driver: bridge
    # external: true
