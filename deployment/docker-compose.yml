services:
  webprofile:
    image: ${APP_IMAGE}:${APP_TAG}
    container_name: ${PROJECT_NAME}
    restart: always
    ports:
      - "${PORT_PUBLISH}:${PORT_IMAGE}"
    env_file:
      - .env
    networks:
      - webprofile-network

networks:
  webprofile-network:
    name: webprofile-network
    driver: bridge
    # external: true
